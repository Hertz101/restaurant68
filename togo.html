    <main>
        <div>
            <div class="dish-month-img">

            </div>
            <div class="form-container">
                <h2>Fettichini Alfredo</h2>
                <form>
                    <!-- Start of mini Challengeb-->
            <div class="input-control">
            <label for="size">Size:</label>
                <select id="size">

            </select>
            </div>
            <div class="input-control">

            <input type="number" id="price">
            </div>

            </div>
            <div class="input-control">

                <textarea id="description"></textarea>
            </div>
            <div class="input-control">

            </div>
        </form>
            <div class="form-container">
                <h2>Payment Method</h2>
        <form action="" method="">
            <label for="fname">First Name:</label>
            <input type="text" id="fname"/>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname"/>
            <input type="submit" value="Submit"/>
            </div>
        <p>Select payment option:</p>
        <form>
            <input type="checkbox" id="payment" name="cash" value="cash"/>
            <label for="cash">Cash</label>
            <input type="checkbox" id="payment" name="card" value="card"/>
            <label for="Credit Card"> Credit Card</label>
            <input type="checkbox" id="payment" name="venmo" value="venmo"/>

            <input type="submit" value="Submit"/>
        <form>
            <fieldset>
                <legend></legend>

                <input type="text" id="fname"/>
                <input type="submit" value="Submit"/>
                <div class="input-control">
                <label for="description">Other Payment Info:</label>
                <textarea id="description"></textarea><br>
            </fieldset>
        </form>
        </div>
